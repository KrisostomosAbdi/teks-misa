<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #edf1f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 30px 15px;
      }

      .viewer {
        width: 100%;
        max-width: 1500px;
        transition: max-width 0.3s ease;
      }

      .toolbar {
        position: sticky;
        top: 10px;
        z-index: 100;
        background: #1f2937;
        color: white;
        border-radius: 12px;
        padding: 15px 20px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      }

      #pdfList {
        flex: 1;
        min-width: 180px;
        max-width: 100%;
        padding: 10px 15px;
        border-radius: 8px;
        border: none;
        background: #374151;
        color: white;
      }

      #flipbook-wrapper {
        background: white;
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
        overflow: hidden;
      }

      #flipbook {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .page {
        background: white;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
      }

      .page canvas {
        width: 100%;
        height: 100%;
      }

      #loading {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: bold;
        z-index: 999;
        display: none;
      }

      button {
        border: none;
        background: #2563eb;
        color: white;
        padding: 10px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        white-space: nowrap;
      }

      button:hover {
        background: #1d4ed8;
      }

      #pageNumber {
        width: 100%;
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
        color: #333;
      }

      /* === NEW MODAL STYLES === */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }

      .modal-overlay.show {
        opacity: 1;
        visibility: visible;
      }

      .modal-content {
        background: white;
        padding: 30px 25px;
        border-radius: 15px;
        text-align: center;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        transform: translateY(20px);
        transition: transform 0.3s ease;
      }

      .modal-overlay.show .modal-content {
        transform: translateY(0);
      }

      .modal-icon {
        font-size: 55px;
        margin-bottom: 15px;
      }

      .modal-content h3 {
        margin-bottom: 10px;
        color: #1f2937;
        font-size: 22px;
      }

      .modal-content p {
        color: #4b5563;
        line-height: 1.5;
        margin-bottom: 25px;
        font-size: 15px;
      }

      #closeModalBtn {
        width: 100%;
        font-size: 16px;
        padding: 14px;
        font-weight: bold;
      }
      /* ======================= */

      @media (max-width: 768px) {
        body {
          padding: 10px;
        }
        .toolbar {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
          padding: 12px;
        }
        #pdfList {
          grid-column: 1 / -1;
          width: 100%;
        }
        #prevBtn {
          grid-column: 1;
          width: 100%;
        }
        #nextBtn {
          grid-column: 2;
          width: 100%;
        }
        #pageNumber {
          font-size: 15px;
          padding-bottom: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div id="dndModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-icon">📱🔇</div>
        <h3>Mohon Perhatian</h3>
        <p>
          Sebelum Perayaan Ekaristi dimulai, mohon untuk
          <strong
            >mengaktifkan mode Jangan Ganggu (Do Not Disturb) / Hening</strong
          >
          pada perangkat Anda agar ibadat dapat berjalan dengan khusyuk.
        </p>
        <button id="closeModalBtn">Baik, Mengerti</button>
      </div>
    </div>

    <div id="loading">Loading PDF...</div>
    <div class="viewer">
      <div class="toolbar">
        <select id="pdfList"></select>
        <button id="prevBtn">PREV</button>
        <button id="nextBtn">NEXT</button>
      </div>

      <div id="flipbook-wrapper">
        <div id="flipbook"></div>
      </div>
      <div id="pageNumber">1 / 1</div>
    </div>
  </body>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    // === NEW MODAL LOGIC ===
    document.addEventListener("DOMContentLoaded", () => {
      const modal = document.getElementById("dndModal");
      const closeBtn = document.getElementById("closeModalBtn");

      // Check if user has already seen it in this session (tab open)
      if (!sessionStorage.getItem("dndReminderSeen")) {
        modal.classList.add("show");
      }

      closeBtn.addEventListener("click", () => {
        modal.classList.remove("show");
        // Save to session storage so it doesn't pop up on refresh
        sessionStorage.setItem("dndReminderSeen", "true");
      });
    });
    // =======================

    fetch("api/getpdf.json")
      .then((res) => res.json())
      .then((data) => {
        const list = document.getElementById("pdfList");

        data.forEach((pdf) => {
          let option = document.createElement("option");
          option.value = pdf.path;
          option.textContent = pdf.name;
          list.appendChild(option);
        });

        loadPDF(data[0].path);
      });

    document.getElementById("pdfList").addEventListener("change", function () {
      loadPDF(this.value);
    });

    let pageFlip = null;
    let singlePageMode = false;

    const spreadBtn = document.getElementById("spreadView");
    const singleBtn = document.getElementById("singleView");

    // Added safety check in case buttons remain commented out in HTML
    if (spreadBtn && singleBtn) {
      spreadBtn.onclick = () => {
        singlePageMode = false;
        spreadBtn.classList.add("active");
        singleBtn.classList.remove("active");
        loadPDF(document.getElementById("pdfList").value);
      };

      singleBtn.onclick = () => {
        singlePageMode = true;
        singleBtn.classList.add("active");
        spreadBtn.classList.remove("active");
        loadPDF(document.getElementById("pdfList").value);
      };
    }

    async function loadPDF(url) {
      document.getElementById("loading").style.display = "flex";

      document.getElementById("prevBtn").onclick = () => {
        if (pageFlip) pageFlip.flipPrev();
      };

      document.getElementById("nextBtn").onclick = () => {
        if (pageFlip) pageFlip.flipNext();
      };

      const viewer = document.querySelector(".viewer");
      const isMobile = window.innerWidth < 768;

      if (singlePageMode || isMobile) {
        viewer.style.maxWidth = "600px";
      } else {
        viewer.style.maxWidth = "1300px";
      }

      if (pageFlip) {
        pageFlip.destroy();
        pageFlip = null;
      }

      const wrapper = document.getElementById("flipbook-wrapper");
      wrapper.innerHTML = "";

      const container = document.createElement("div");
      container.id = "flipbook";
      wrapper.appendChild(container);

      const pdf = await pdfjsLib.getDocument(url).promise;
      const pages = [];

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1.5 });
        const canvas = document.createElement("canvas");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
          canvasContext: canvas.getContext("2d"),
          viewport: viewport,
        }).promise;

        const div = document.createElement("div");
        div.className = "page";
        div.appendChild(canvas);

        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.objectFit = "contain";

        container.appendChild(div);
        pages.push(div);
      }

      const firstPage = await pdf.getPage(1);
      const vp = firstPage.getViewport({ scale: 1 });
      const pdfRatio = vp.height / vp.width;

      const baseWidth = isMobile ? window.innerWidth - 20 : 550;
      const baseHeight = baseWidth * pdfRatio;

      pageFlip = new window.St.PageFlip(container, {
        width: baseWidth,
        height: baseHeight,
        size: "stretch",
        usePortrait: singlePageMode || isMobile,
        minWidth: 280,
        maxWidth: 1000,
        minHeight: 380,
        maxHeight: 1500,
        showCover: false,
        mobileScrollSupport: false,
      });

      pageFlip.loadFromHTML(pages);

      pageFlip.on("flip", (e) => {
        document.getElementById("pageNumber").innerHTML =
          `${e.data + 1} / ${pageFlip.getPageCount()}`;
      });

      document.getElementById("pageNumber").innerHTML = `1 / ${pdf.numPages}`;
      document.getElementById("loading").style.display = "none";
    }

    window.addEventListener("resize", () => {
      clearTimeout(window.resizeTimer);
      window.resizeTimer = setTimeout(() => {
        if (document.getElementById("pdfList").value) {
          loadPDF(document.getElementById("pdfList").value);
        }
      }, 300);
    });
  </script>
</html>
