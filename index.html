<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buku Misa Digital</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        /* Elegant serif font and warm parchment background to reduce glare */
        /* font-family: "Lora", serif; */
        font-family: "Roboto", "Inter", sans-serif;
        background: #f7f5f0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 30px 15px;
      }

      .viewer {
        width: 100%;
        max-width: 1500px;
        transition: max-width 0.4s ease-in-out;
      }

      /* === CHURCH THEMED TOOLBAR === */
      .toolbar {
        position: sticky;
        top: 10px;
        z-index: 100;

        /* Deep Burgundy and Gold styling */
        background: #966331;
        border-bottom: 3px solid #5f3f1f;
        color: #fdfbf7;

        border-radius: 8px;
        padding: 12px 20px;
        margin-bottom: 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 15px;
        box-shadow: 0 10px 30px rgba(91, 35, 38, 0.15);
      }

      #pdfList {
        flex: 1;
        min-width: 180px;
        max-width: 100%;
        padding: 10px 15px;
        border-radius: 6px;
        /* Matching dropdown to toolbar */
        background: #966331;
        color: #fdfbf7;
        border: 1px solid #ffffff;
        font-family: "Roboto", "Inter", sans-serif;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
        outline: none;
      }

      #pdfList option {
        background: #f7f5f0;
        color: #333;
      }

      button {
        background: transparent;
        color: #ffffff;
        border: 1px solid #ffffff;
        padding: 8px 18px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 900;
        font-family: "Roboto", "Inter", sans-serif;
        letter-spacing: 0.5px;
        white-space: nowrap;
        transition: all 0.3s ease;
      }

      button:hover {
        background: #ffffff;
        color: #000000;
      }

      /* === FLIPBOOK CONTAINER === */
      #flipbook-wrapper {
        background: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        /* Softer, larger shadow for a "floating book" feel */
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        border-radius: 4px;
      }

      #flipbook {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .page {
        background: white;
        border-radius: 2px; /* Less rounded, more like paper pages */
        overflow: hidden;
        /* Book spine shadow effect */
        box-shadow:
          inset -1px 0 5px rgba(0, 0, 0, 0.05),
          0 5px 15px rgba(0, 0, 0, 0.15);
      }

      .page canvas {
        width: 100%;
        height: 100%;
      }

      #pageNumber {
        width: 100%;
        margin-top: 20px;
        text-align: center;
        font-weight: 600;
        font-size: 15px;
        color: #966331;
        letter-spacing: 1px;
      }

      #loading {
        position: fixed;
        inset: 0;
        background: rgba(247, 245, 240, 0.9); /* Parchment loading screen */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        color: #966331;
        z-index: 999;
        display: none;
      }

      /* === ELEGANT MODAL === */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(44, 36, 27, 0.75); /* Darker, warmer overlay */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.4s ease,
          visibility 0.4s ease;
      }

      .modal-overlay.show {
        opacity: 1;
        visibility: visible;
      }

      .modal-content {
        background: #f7f5f0; /* Parchment body */
        padding: 40px 30px;
        border-radius: 8px;
        text-align: center;
        max-width: 420px;
        width: 90%;
        border-top: 6px solid #966331;
        border-bottom: 6px solid #966331;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        transform: translateY(20px);
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .modal-overlay.show .modal-content {
        transform: translateY(0);
      }

      .modal-icon {
        font-size: 45px;
        margin-bottom: 15px;
        color: #966331;
      }

      .modal-content h3 {
        margin-bottom: 15px;
        color: #966331;
        font-size: 24px;
        font-weight: 600;
      }

      .modal-content p {
        color: #4a4a4a;
        line-height: 1.6;
        margin-bottom: 30px;
        font-size: 16px;
      }

      #closeModalBtn {
        width: 100%;
        font-size: 16px;
        padding: 12px;
        background: #966331;
        color: #ffffff;
        border: none;
      }

      #closeModalBtn:hover {
        background: #73363a;
        color: #fdfbf7;
      }

      /* === MOBILE RESPONSIVENESS === */
      @media (max-width: 768px) {
        body {
          padding: 10px;
        }
        .toolbar {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 12px;
          padding: 15px;
        }
        #pdfList {
          grid-column: 1 / -1;
          width: 100%;
          padding: 12px;
        }
        #prevBtn {
          grid-column: 1;
          width: 100%;
          padding: 12px;
        }
        #nextBtn {
          grid-column: 2;
          width: 100%;
          padding: 12px;
        }
        #pageNumber {
          font-size: 14px;
          padding-bottom: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div id="dndModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-icon">🔕</div>
        <h3>Mohon Hening</h3>
        <p>
          Sebelum Perayaan Ekaristi dimulai, mohon untuk
          <strong
            >mengaktifkan mode Jangan Ganggu (Do Not Disturb) / Hening</strong
          >
          pada perangkat Anda agar ibadat dapat berjalan dengan khusyuk.
        </p>
        <button id="closeModalBtn">Baik, Mengerti</button>
      </div>
    </div>

    <div id="loading">Mempersiapkan Teks Misa...</div>

    <div class="viewer">
      <div class="toolbar">
        <select id="pdfList"></select>
        <button id="prevBtn">SEBELUMNYA</button>
        <button id="nextBtn">SELANJUTNYA</button>
      </div>

      <div id="flipbook-wrapper">
        <div id="flipbook"></div>
      </div>
      <div id="pageNumber">1 / 1</div>
    </div>
  </body>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    // === MODAL LOGIC ===
    document.addEventListener("DOMContentLoaded", () => {
      const modal = document.getElementById("dndModal");
      const closeBtn = document.getElementById("closeModalBtn");

      if (!sessionStorage.getItem("dndReminderSeen")) {
        modal.classList.add("show");
      }

      closeBtn.addEventListener("click", () => {
        modal.classList.remove("show");
        sessionStorage.setItem("dndReminderSeen", "true");
      });
    });

    // Fetch PDFs
    fetch("api/getpdf.json")
      .then((res) => res.json())
      .then((data) => {
        const list = document.getElementById("pdfList");

        data.forEach((pdf) => {
          let option = document.createElement("option");
          option.value = pdf.path;
          option.textContent = pdf.name.replace(".pdf", ""); // Removes .pdf from dropdown for cleaner look
          list.appendChild(option);
        });

        loadPDF(data[0].path);
      });

    document.getElementById("pdfList").addEventListener("change", function () {
      loadPDF(this.value);
    });

    let pageFlip = null;
    let singlePageMode = false; // Kept false by default to allow auto-responsive spread

    async function loadPDF(url) {
      document.getElementById("loading").style.display = "flex";

      document.getElementById("prevBtn").onclick = () => {
        if (pageFlip) pageFlip.flipPrev();
      };

      document.getElementById("nextBtn").onclick = () => {
        if (pageFlip) pageFlip.flipNext();
      };

      const viewer = document.querySelector(".viewer");
      const isMobile = window.innerWidth < 768;

      if (singlePageMode || isMobile) {
        viewer.style.maxWidth = "600px";
      } else {
        viewer.style.maxWidth = "1200px"; // Slightly narrowed for a more book-like frame
      }

      if (pageFlip) {
        pageFlip.destroy();
        pageFlip = null;
      }

      const wrapper = document.getElementById("flipbook-wrapper");
      wrapper.innerHTML = "";

      const container = document.createElement("div");
      container.id = "flipbook";
      wrapper.appendChild(container);

      const pdf = await pdfjsLib.getDocument(url).promise;
      const pages = [];

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1.5 });
        const canvas = document.createElement("canvas");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
          canvasContext: canvas.getContext("2d"),
          viewport: viewport,
        }).promise;

        const div = document.createElement("div");
        div.className = "page";
        div.appendChild(canvas);

        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.objectFit = "contain";

        container.appendChild(div);
        pages.push(div);
      }

      const firstPage = await pdf.getPage(1);
      const vp = firstPage.getViewport({ scale: 1 });
      const pdfRatio = vp.height / vp.width;

      const baseWidth = isMobile ? window.innerWidth - 20 : 550;
      const baseHeight = baseWidth * pdfRatio;

      pageFlip = new window.St.PageFlip(container, {
        width: baseWidth,
        height: baseHeight,
        size: "stretch",
        usePortrait: singlePageMode || isMobile,
        minWidth: 280,
        maxWidth: 1000,
        minHeight: 380,
        maxHeight: 1500,
        showCover: false,
        mobileScrollSupport: false,
      });

      pageFlip.loadFromHTML(pages);

      pageFlip.on("flip", (e) => {
        document.getElementById("pageNumber").innerHTML =
          `Halaman ${e.data + 1} dari ${pageFlip.getPageCount()}`;
      });

      document.getElementById("pageNumber").innerHTML =
        `Halaman 1 dari ${pdf.numPages}`;
      document.getElementById("loading").style.display = "none";
    }

    window.addEventListener("resize", () => {
      clearTimeout(window.resizeTimer);
      window.resizeTimer = setTimeout(() => {
        if (document.getElementById("pdfList").value) {
          loadPDF(document.getElementById("pdfList").value);
        }
      }, 300);
    });
  </script>
</html>
