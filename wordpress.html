<style>
  /* === SCOPED CSS FOR WORDPRESS === */
  #buku-misa-container * {
    box-sizing: border-box;
  }

  #buku-misa-container {
    font-family: "Roboto", "Inter", sans-serif;
    background: #f7f5f0;
    min-height: 80vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;

    position: relative;

  }

  #buku-misa-container .viewer {
    width: 100%;
    max-width: 1500px;
    transition: max-width 0.4s ease-in-out;
  }

  /* === CHURCH THEMED TOOLBAR === */
  #buku-misa-container .toolbar {
    position: sticky;
    top: 10px;
    z-index: 100;
    background: #966331;
    border-bottom: 3px solid #5f3f1f;

    padding: 12px 20px;

  #buku-misa-container #pdfList {

    min-width: 180px;

    border: 1px solid #ffffff;

    outline: none;

  #buku-misa-container #pdfList option {
    background: #f7f5f0;
    color: #333;
  }

  #buku-misa-container button {
    background: transparent;
    color: #ffffff;

    padding: 8px 15px;

    font-size: 14px;

    white-space: nowrap;

  #buku-misa-container button:hover {
    background: #ffffff;

  }

  #buku-misa-container #refreshBtn {
    background: #5f3f1f;
  }
  #buku-misa-container #refreshBtn:hover {
    background: #ffffff;
    color: #000000;
  }

  /* === FLIPBOOK CONTAINER === */
  /* === FLIPBOOK CONTAINER === */
  #buku-misa-container #flipbook-wrapper {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
    border-radius: 4px;

    touch-action: pan-y;
    overflow-anchor: none;

    /* NEW FIX: Creates a strict boundary so 3D page corners don't stretch the page height */
    overflow: hidden;
    transform: translateZ(0);
  }

  #buku-misa-container #flipbook {
    width: 100%;
    display: flex;
    justify-content: center;
    /* STRICT OVERRIDE: Forces the browser to handle up/down scrolling natively */
    touch-action: pan-y !important;
  }

  #buku-misa-container .page {
    background: white;
    border-radius: 2px;
    overflow: hidden;
    box-shadow:
      inset -1px 0 5px rgba(0, 0, 0, 0.05),
      0 5px 15px rgba(0, 0, 0, 0.15);
  }

  #buku-misa-container .page canvas {
    width: 100%;
    height: 100%;
    /* FIX: Ensure canvas doesn't blur on resize */
    object-fit: contain;
  }

  #buku-misa-container #pageNumber {
    width: 100%;
    margin-top: 20px;
    text-align: center;
    font-weight: 600;
    font-size: 15px;
    color: #966331;
    letter-spacing: 1px;
  }

  #buku-misa-container #loading {
    position: fixed;
    inset: 0;
    background: rgba(247, 245, 240, 0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    color: #966331;
    z-index: 9999;
    display: none;
  }

  /* === ELEGANT MODAL === */
  #buku-misa-container .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44, 36, 27, 0.75);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    opacity: 0;
    visibility: hidden;
    transition:
      opacity 0.4s ease,
      visibility 0.4s ease;
  }

  #buku-misa-container .modal-overlay.show {
    opacity: 1;
    visibility: visible;
  }

  #buku-misa-container .modal-content {
    background: #f7f5f0;
    padding: 40px 30px;
    border-radius: 8px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    border-top: 6px solid #966331;
    border-bottom: 6px solid #966331;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    transform: translateY(20px);
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  #buku-misa-container .modal-overlay.show .modal-content {
    transform: translateY(0);
  }

  #buku-misa-container .modal-icon {
    font-size: 45px;
    margin-bottom: 15px;
    color: #966331;
  }

  #buku-misa-container .modal-content h3 {
    margin-bottom: 15px;
    color: #966331;
    font-size: 24px;
    font-weight: 600;
  }

  #buku-misa-container .modal-content p {
    color: #4a4a4a;
    line-height: 1.6;
    margin-bottom: 30px;
    font-size: 16px;
  }

  #buku-misa-container #closeModalBtn {
    width: 100%;
    font-size: 16px;
    padding: 12px;
    background: #966331;
    color: #ffffff;
    border: none;
  }

  #buku-misa-container #closeModalBtn:hover {
    background: #73363a;
    color: #fdfbf7;
  }

  /* === EXTRACTED LINKS SECTION === */
  #buku-misa-container #pdf-links-section {
    width: 100%;
    margin-top: 30px;
    padding: 20px;
    background: #ffffff;
    border: 1px solid #966331;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(91, 35, 38, 0.05);
  }
  #buku-misa-container #pdf-links-section h3 {
    color: #966331;
    margin-top: 0;
    margin-bottom: 15px;
    font-size: 18px;
    font-weight: 600;
    border-bottom: 2px solid #f7f5f0;
    padding-bottom: 10px;
  }
  #buku-misa-container #pdf-links-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #buku-misa-container #pdf-links-list li a {
    display: block;
    padding: 12px 15px;
    background: #f7f5f0;
    color: #5f3f1f;

    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
    word-break: break-all;

  }
  #buku-misa-container #pdf-links-list li a:hover {
    background: #966331;
    color: #ffffff;
    border-left-color: #5f3f1f;
  }

  /* === GOOGLE DRIVE FALLBACK BUTTON === */
  #buku-misa-container .drive-fallback-container {
    width: 100%;
    text-align: center;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 2px dashed #d1c7b8;
  }
  #buku-misa-container .drive-fallback-container p {
    color: #5f3f1f;
    font-size: 14px;
    margin-bottom: 10px;
  }
  #buku-misa-container .drive-fallback-btn {
    display: inline-block;
    background: transparent;
    color: #966331;
    border: 2px solid #966331;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: all 0.3s ease;
  }
  #buku-misa-container .drive-fallback-btn:hover {
    background: #966331;
    color: #ffffff;
  }

  /* === MOBILE RESPONSIVENESS === */
  @media (max-width: 768px) {
    #buku-misa-container {
      padding: 10px;
    }
    #buku-misa-container .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
    }
    #buku-misa-container #pdfList {
      grid-column: 1 / -1;
      width: 100%;
      padding: 12px;
    }
    #buku-misa-container #fullscreenBtn {
      grid-column: 1;
      width: 100%;
      padding: 12px;
      background: #73363a;
    }
    #buku-misa-container #refreshBtn {
      grid-column: 2;
      width: 100%;
      padding: 12px;
    }
    #buku-misa-container #prevBtn {
      grid-column: 1;
      width: 100%;
      padding: 12px;
    }
    #buku-misa-container #nextBtn {
      grid-column: 2;
      width: 100%;
      padding: 12px;
    }
    #buku-misa-container #pageNumber {
      font-size: 14px;
      padding-bottom: 20px;
    }
  }
</style>

<div id="buku-misa-container">
  <div id="dndModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-icon">🔕</div>
      <h3>Mohon Hening</h3>
      <p>
        Sebelum Perayaan Ekaristi dimulai, mohon untuk
        <strong
          >mengaktifkan mode Jangan Ganggu (Do Not Disturb) / Hening</strong
        >
        pada perangkat Anda agar ibadat dapat berjalan dengan khusyuk.
      </p>

  <div id="loading">Mempersiapkan Teks Misa...</div>

      <button type="button" id="refreshBtn">PERBARUI PDF</button>

      <p>Teks Misa bermasalah?</p>
      <a
        href="https://drive.google.com/drive/folders/19-7BXn23MOd8OVgMKxQal00BUERXAMO1"
        target="_blank"
        rel="noopener noreferrer"
        class="drive-fallback-btn"
      >
        Buka Folder Google Drive
      </a>
    </div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  // === CACHE SYSTEM ===
  const pdfCache = {};

  // === MODAL LOGIC ===
  document.addEventListener("DOMContentLoaded", () => {
    const modal = document.getElementById("dndModal");
    const closeBtn = document.getElementById("closeModalBtn");

    if (!sessionStorage.getItem("dndReminderSeen")) {
      modal.classList.add("show");
    }

    closeBtn.addEventListener("click", () => {
      modal.classList.remove("show");
      sessionStorage.setItem("dndReminderSeen", "true");
    });
  });

  // === FULLSCREEN LOGIC ===
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const container = document.getElementById("buku-misa-container");

  fullscreenBtn.addEventListener("click", () => {
    if (!document.fullscreenElement) {
      if (container.requestFullscreen) {
        container.requestFullscreen();
      } else if (container.webkitRequestFullscreen) {
        container.webkitRequestFullscreen();
      }
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    }
  });

  const handleFullscreenStyles = () => {
    // Check for both standard and webkit (Safari/Older iOS) fullscreen elements
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      fullscreenBtn.innerText = "TUTUP LAYAR";
      container.style.minHeight = "100vh";
      container.style.height = "100vh"; // Lock height to monitor viewport
      container.style.borderRadius = "0";
      container.style.overflowY = "auto"; // FIX: Enables vertical scrolling
      container.style.paddingBottom = "50px"; // Adds breathing room at the bottom
    } else {
      fullscreenBtn.innerText = "LAYAR PENUH";
      container.style.minHeight = "80vh";
      container.style.height = "auto"; // Revert to dynamic height
      container.style.borderRadius = "8px";
      container.style.overflowY = "visible"; // Removes the scrollbar
      container.style.paddingBottom = "30px"; // Revert original padding
    }
  };

  // Listen to both standard and WebKit fullscreen events for better compatibility
  document.addEventListener("fullscreenchange", handleFullscreenStyles);
  document.addEventListener("webkitfullscreenchange", handleFullscreenStyles);
  // === REFRESH LOGIC ===
  const refreshBtn = document.getElementById("refreshBtn");
  refreshBtn.addEventListener("click", () => {
    let currentCount = parseInt(
      sessionStorage.getItem("pdfRefreshCount") || "0",
    );
    if (currentCount >= 5) {
      alert(
        "Anda telah mencapai batas maksimal perbarui PDF (5 kali) untuk sesi ini. Silakan muat ulang (refresh) halaman website jika masih mengalami kendala.",
      );
      return;
    }
    sessionStorage.setItem("pdfRefreshCount", (currentCount + 1).toString());
    updateDropdownAndPDF(false);
  });

  const GAS_URL =
    "https://script.google.com/macros/s/AKfycbxmu3e_GyGQKiZydcrGlMs82WyrHPAp668Y6LOvEg6kAepZHmQtf2gIe_KlXDP-2qB8/exec";
  let pageFlip = null;
  let singlePageMode = false;

  async function updateDropdownAndPDF(isInitialLoad = true) {
    const list = document.getElementById("pdfList");
    const previousSelection = list.value;

    if (!isInitialLoad) {
      const loadingScreen = document.getElementById("loading");
      loadingScreen.style.display = "flex";
      loadingScreen.innerText = "Memperbarui Teks Misa...";
    }

    try {
      const res = await fetch(GAS_URL);
      const data = await res.json();
      list.innerHTML = "";

      data.forEach((pdf) => {
        let option = document.createElement("option");
        option.value = pdf.id;
        option.textContent = pdf.name.replace(".pdf", "");
        list.appendChild(option);
      });

      if (data.length > 0) {
        const stillExists = data.some((pdf) => pdf.id === previousSelection);
        const targetId =
          !isInitialLoad && stillExists ? previousSelection : data[0].id;
        list.value = targetId;

        if (!isInitialLoad) {
          delete pdfCache[targetId];
        }
        loadPDF(targetId);
      } else {
        document.getElementById("loading").innerText =
          "Tidak ada file PDF di Google Drive.";
      }
    } catch (error) {
      console.error("Gagal mengambil daftar PDF:", error);
      document.getElementById("loading").innerText =
        "Gagal menghubungi server.";
      setTimeout(() => {
        document.getElementById("loading").style.display = "none";
      }, 2000);
    }
  }

  const loadingScreen = document.getElementById("loading");
  loadingScreen.style.display = "flex";
  loadingScreen.innerText = "Mempersiapkan Teks Misa...";

  updateDropdownAndPDF(true);
  document.getElementById("pdfList").addEventListener("change", function () {
    loadPDF(this.value);
  });

  // NEW: Global variable for our timer so we can clear it easily
  let slowLoadTimer;

  async function loadPDF(id) {
    const loadingScreen = document.getElementById("loading");
    loadingScreen.style.display = "flex";

    // Reset loading screen text to default
    loadingScreen.innerHTML =
      "Mempersiapkan Teks Misa...<br><span style='font-size:14px; font-weight:normal; margin-top:10px;'>Harap menunggu sebentar.</span>";

    // ---> NEW: The 15-Second Rescue Timer <---
    clearTimeout(slowLoadTimer); // Clear any old timers
    slowLoadTimer = setTimeout(() => {
      loadingScreen.innerHTML = `
        <div style="text-align: center; padding: 0 20px;">
          <p style="margin-bottom: 15px;">Koneksi lambat atau file terlalu besar...</p>
          <a href="https://drive.google.com/drive/folders/19-7BXn23MOd8OVgMKxQal00BUERXAMO1" target="_blank" rel="noopener noreferrer" 
             style="background: #966331; color: white; padding: 12px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; display: inline-block; font-size: 16px;">
            Akses Langsung via Google Drive
          </a>
        </div>
      `;
    }, 15000); // 15000 milliseconds = 15 seconds
    // -----------------------------------------

    document.getElementById("prevBtn").onclick = (e) => {
      e.preventDefault(); // Blocks WordPress from scrolling up
      if (pageFlip) pageFlip.flipPrev();
    };
    document.getElementById("nextBtn").onclick = (e) => {
      e.preventDefault(); // Blocks WordPress from scrolling up
      if (pageFlip) pageFlip.flipNext();
    };

    const viewer = document.querySelector(".viewer");
    const isMobile = window.innerWidth < 768;
    viewer.style.maxWidth = singlePageMode || isMobile ? "600px" : "1200px";

    if (pageFlip) {
      pageFlip.destroy();
      pageFlip = null;
    }

    const wrapper = document.getElementById("flipbook-wrapper");
    wrapper.innerHTML = "";

    const containerWrapper = document.createElement("div");
    containerWrapper.id = "flipbook";
    wrapper.appendChild(containerWrapper);

    try {
      let base64String;

      // FIX: Caching base64 string to prevent DataCloneError crashes
      if (pdfCache[id]) {
        loadingScreen.innerText = "Mempersiapkan Halaman...";
        base64String = pdfCache[id];
      } else {
        loadingScreen.innerText = "Mengunduh Teks Misa...";
        const response = await fetch(`${GAS_URL}?action=getpdf&id=${id}`);
        base64String = await response.text();
        pdfCache[id] = base64String;
      }

      loadingScreen.innerText = "Mempersiapkan Halaman...";

      const pdfData = atob(base64String);
      const uint8Array = new Uint8Array(pdfData.length);
      for (let i = 0; i < pdfData.length; i++) {
        uint8Array[i] = pdfData.charCodeAt(i);
      }

      const pdf = await pdfjsLib.getDocument({ data: uint8Array }).promise;
      const pages = [];

      // FIX: Dynamic resolution rendering to save RAM on old phones!
      // Desktop uses 1.5 for crispness, mobile uses 1.1 for memory safety.
      // const renderScale = isMobile ? 1.1 : 1.5;

      // for (let i = 1; i <= pdf.numPages; i++) {
      //   const page = await pdf.getPage(i);
      //   const viewport = page.getViewport({ scale: renderScale });
      //   const canvas = document.createElement("canvas");

      //   canvas.width = viewport.width;
      //   canvas.height = viewport.height;

      //   await page.render({
      //     canvasContext: canvas.getContext("2d"),
      //     viewport: viewport,
      //   }).promise;

      //   const div = document.createElement("div");
      //   div.className = "page";
      //   div.appendChild(canvas);

      //   containerWrapper.appendChild(div);
      //   pages.push(div);

      // }

      // NEW: Array to store all extracted links
      const extractedLinks = [];
      const renderScale = isMobile ? 1.1 : 1.5;

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: renderScale });
        const canvas = document.createElement("canvas");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({
          canvasContext: canvas.getContext("2d"),
          viewport: viewport,
        }).promise;

        // ---> NEW: Automatically extract links for this page <---
        const annotations = await page.getAnnotations();
        const linkAnnotations = annotations.filter(
          (a) => a.subtype === "Link" && a.url,
        );

        linkAnnotations.forEach((link) => {
          extractedLinks.push({
            page: i,
            url: link.url,
          });
        });
        // -------------------------------------------------------

        const div = document.createElement("div");
        div.className = "page";
        div.appendChild(canvas);

        containerWrapper.appendChild(div);
        pages.push(div);
      }

      // ---> NEW: Render the links to the UI <---
      const linksSection = document.getElementById("pdf-links-section");
      const linksList = document.getElementById("pdf-links-list");

      // Clear previous links
      linksList.innerHTML = "";

      if (extractedLinks.length > 0) {
        // Remove duplicate URLs to keep the list clean
        const uniqueLinks = Array.from(
          new Set(extractedLinks.map((a) => a.url)),
        ).map((url) => {
          return extractedLinks.find((a) => a.url === url);
        });

        uniqueLinks.forEach((item) => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = item.url;
          a.target = "_blank"; // Opens in a new tab
          a.rel = "noopener noreferrer"; // Security best practice
          // Shows what page the link was found on
          a.innerText = `[Halaman ${item.page}] ${item.url}`;

          li.appendChild(a);
          linksList.appendChild(li);
        });

        linksSection.style.display = "block"; // Show the container
      } else {
        linksSection.style.display = "none"; // Hide if no links exist
      }
      // -----------------------------------------

      const firstPage = await pdf.getPage(1);

      const vp = firstPage.getViewport({ scale: 1 });
      const pdfRatio = vp.height / vp.width;

      const baseWidth = isMobile ? window.innerWidth - 20 : 550;
      const baseHeight = baseWidth * pdfRatio;

      pageFlip = new window.St.PageFlip(containerWrapper, {
        width: baseWidth,
        height: baseHeight,
        size: "stretch",
        usePortrait: singlePageMode || isMobile,
        minWidth: 280,
        maxWidth: 1000,
        minHeight: 380,
        maxHeight: 1500,
        showCover: false,
        mobileScrollSupport: true,
        // NEW: Require a much more deliberate horizontal swipe (default is 30)
        swipeDistance: 70,
      });

      pageFlip.loadFromHTML(pages);

      pageFlip.on("flip", (e) => {
        document.getElementById("pageNumber").innerHTML =
          `Halaman ${e.data + 1} dari ${pageFlip.getPageCount()}`;
      });

      // Find this part near the end of your try block:
      document.getElementById("pageNumber").innerHTML =
        `Halaman 1 dari ${pdf.numPages}`;

      // ADD THIS LINE to stop the timer on success:
      clearTimeout(slowLoadTimer);

      loadingScreen.style.display = "none";
      loadingScreen.innerText = "Mempersiapkan Teks Misa...";
    } catch (error) {
      console.error("Failed to load PDF:", error);

      // ADD THIS LINE to stop the timer on error:
      clearTimeout(slowLoadTimer);

      // Update how errors are displayed
      loadingScreen.innerHTML = `
        <p>Gagal memuat PDF.</p>
        <a href="https://drive.google.com/drive/folders/19-7BXn23MOd8OVgMKxQal00BUERXAMO1" target="_blank" style="color: #966331; text-decoration: underline; margin-top: 10px; display: block;">Coba akses via Google Drive</a>
      `;
    }
  }

  // FIX: Smart Resize. Only triggers if the screen WIDTH changes (e.g. rotating phone).
  // Prevents intense lag when scrolling up/down hides the mobile browser address bar.
  let lastWidth = window.innerWidth;
  window.addEventListener("resize", () => {
    clearTimeout(window.resizeTimer);
    window.resizeTimer = setTimeout(() => {
      if (window.innerWidth !== lastWidth) {
        lastWidth = window.innerWidth;
        if (document.getElementById("pdfList").value) {
          loadPDF(document.getElementById("pdfList").value);
        }
      }
    }, 300);
  });
</script>
